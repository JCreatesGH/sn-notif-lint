<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="SFMono-Regular,Consolas,Menlo,monospace">
  <rect width="800" height="380" rx="10" fill="#11111b"/>
  <rect width="800" height="34" rx="10" fill="#313244"/><rect y="20" width="800" height="14" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="40" cy="17" r="6" fill="#f9e2af"/><circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" fill="#bac2de" font-size="12" text-anchor="middle">notiflint — "Incident Opened" template</text>
  <text font-size="13" xml:space="preserve">
    <tspan x="18" y="64" fill="#6c7086">Subject: </tspan><tspan fill="#cdd6f4">INC ${number}: ${short_desc}</tspan>
    <tspan x="18" y="86" fill="#6c7086">Body:    </tspan><tspan fill="#cdd6f4">Hi ${current.caller_id}, priority ${current.prioirty}.</tspan>
    <tspan x="80" y="106" fill="#cdd6f4">View it at ${URI_REF}. ${mail_script:signature</tspan>
  </text>
  <rect x="18" y="124" width="764" height="190" rx="8" fill="#181825"/>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="34" y="150" fill="#f38ba8">  HIGH   unknown-field: References 'short_desc' which is not a</tspan>
    <tspan x="58" y="168" fill="#f38ba8">field on the target table.  (did you mean short_description?)</tspan>
    <tspan x="34" y="192" fill="#f38ba8">  HIGH   unknown-field: References 'prioirty' — not a field.</tspan>
    <tspan x="34" y="216" fill="#f38ba8">  HIGH   unclosed-variable: An unclosed ${ ... was found.</tspan>
    <tspan x="58" y="234" fill="#6c7086">(${mail_script:signature  ← missing })</tspan>
    <tspan x="34" y="258" fill="#f9e2af">  MEDIUM unknown-mail-script: 'signature' does not exist.</tspan>
    <tspan x="34" y="290" fill="#6c7086"># the classic causes of a blank or broken notification email</tspan>
  </text>
  <text x="18" y="346" font-size="12.5" fill="#a6e3a1">✓ 8 tests · validates fields against the table dictionary · empty subject/body</text>
  <text x="18" y="368" font-size="12" fill="#6c7086">handles ${current.x} · ${field} · ${mail_script:x} · ${URI} · catches malformed refs</text>
</svg>
